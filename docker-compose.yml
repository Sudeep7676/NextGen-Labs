# Production-like stack: PostgreSQL + Spring Boot backend.
# 1) copy .env.production.example -> .env and fill in real secrets
# 2) docker compose up -d --build
# The frontend is deployed separately (static host) pointing VITE_API_URL here.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: nextgenlabs
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/nextgenlabs
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_COMPANY_INBOX: ${EMAIL_COMPANY_INBOX}
      CORS_ORIGINS: ${CORS_ORIGINS}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD}
      TURNSTILE_ENABLED: ${TURNSTILE_ENABLED:-false}
      TURNSTILE_SECRET: ${TURNSTILE_SECRET:-}
    ports:
      - "8080:8080"

volumes:
  pgdata:
