# Backend only — database is Supabase (managed PostgreSQL).
#   1) cp .env.production.example .env   (fill in Supabase + secrets)
#   2) docker compose -f docker-compose.supabase.yml up -d --build
services:
  backend:
    build: ./backend
    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DB_POOL_MIN: ${DB_POOL_MIN:-1}
      JWT_SECRET: ${JWT_SECRET}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_COMPANY_INBOX: ${EMAIL_COMPANY_INBOX}
      CORS_ORIGINS: ${CORS_ORIGINS}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD}
      TURNSTILE_ENABLED: ${TURNSTILE_ENABLED:-false}
      TURNSTILE_SECRET: ${TURNSTILE_SECRET:-}
    ports:
      - "8080:8080"
    restart: unless-stopped
