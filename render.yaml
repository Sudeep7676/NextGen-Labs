# Render Blueprint for the NextGen Labs backend (Docker).
# Database is Supabase; set the secret env vars in the Render dashboard.
services:
  - type: web
    name: nextgenlabs-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /actuator/health
    autoDeploy: true
    envVars:
      - key: DB_URL
        sync: false          # jdbc:postgresql://aws-0-ap-northeast-1.pooler.supabase.com:5432/postgres?sslmode=require
      - key: DB_USERNAME
        sync: false          # postgres.zddxzipwhnitncvcfkej
      - key: DB_PASSWORD
        sync: false          # your Supabase password
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a strong secret
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_COMPANY_INBOX
        sync: false
      - key: RESEND_API_KEY
        sync: false          # Resend API key (email works on Render via HTTPS)
      - key: CORS_ORIGINS
        sync: false          # your Vercel frontend URL
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
