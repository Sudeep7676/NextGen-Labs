# Local development profile — zero external dependencies.
# Run with:  mvn spring-boot:run -Dspring-boot.run.profiles=dev
# Uses an in-memory H2 database (data resets on restart) and skips Flyway.
spring:
  datasource:
    url: jdbc:h2:mem:nextgenlabs;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8090

app:
  email:
    enabled: true           # send real emails via Gmail SMTP
  turnstile:
    enabled: false          # skip captcha locally
  bootstrap:
    super-admin-email: admin@nextgenlabs.ai
